<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Warung Umi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background: #1a1a2e;
            padding: 24px;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header h1 {
            color: #d32f2f;
            font-size: 1.5rem;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }

        .login-container input {
            width: 100%;
            padding: 12px 16px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 30px;
            font-size: 14px;
        }

        .login-container button {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
        }

        .error-msg {
            color: red;
            font-size: 12px;
            margin-top: 10px;
        }

        .main-content {
            display: none;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2rem;
            color: #d32f2f;
        }

        .section {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .section h2 {
            color: #1a1a2e;
            margin-bottom: 20px;
            font-size: 1.3rem;
            border-left: 4px solid #d32f2f;
            padding-left: 12px;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
        }

        .form-row input, .form-row select {
            padding: 10px 16px;
            border: 1px solid #ddd;
            border-radius: 30px;
            font-size: 13px;
            flex: 1;
            min-width: 120px;
        }

        .weight-group {
            display: flex;
            gap: 8px;
            flex: 1;
            min-width: 150px;
        }
        .weight-group input {
            flex: 2;
            min-width: 80px;
        }
        .weight-group select {
            flex: 1;
            min-width: 80px;
        }

        .form-row button {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }

        .product-table {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f5f5f5;
            font-weight: 600;
        }

        .edit-btn, .delete-btn {
            padding: 4px 12px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            margin: 0 4px;
        }

        .edit-btn {
            background: #ffc107;
            color: #1a1a2e;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
        }

        .btn-view-store {
            background: #d32f2f;
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 30px;
            display: inline-block;
        }

        .promo-section {
            background: #fff0e0;
        }

        /* MODAL EDIT */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 28px;
            max-width: 500px;
            width: 90%;
        }
        .modal-content h3 {
            color: #d32f2f;
            margin-bottom: 20px;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px;
            border: 1px solid #ddd;
            border-radius: 30px;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        .save-edit-btn { background: #2e7d32; color: white; }
        .cancel-edit-btn { background: #ccc; color: #333; }

        @media (max-width: 768px) {
            body { padding: 16px; }
            .form-row { flex-direction: column; }
            .form-row button { width: 100%; }
        }
    </style>
</head>
<body>
<div id="app">
    <div id="loginContainer" class="login-container">
        <h2 style="color:#d32f2f; margin-bottom:20px;">🔧 Admin Warung Umi</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
        <div id="loginError" class="error-msg"></div>
    </div>

    <div id="mainContent" class="dashboard main-content">
        <div class="header">
            <h1>🔧 Dashboard Warung Umi</h1>
            <div>
                <a href="index.html" target="_blank" class="btn-view-store">🛒 Lihat Toko</a>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card"><h3 id="totalProducts">0</h3><p>Total Produk</p></div>
            <div class="stat-card"><h3>6</h3><p>Kategori</p></div>
            <div class="stat-card"><h3>📞 WA</h3><p>0852-1320-5216</p></div>
        </div>

        <div class="section promo-section">
            <h2>🎯 Atur Promo Toko</h2>
            <div class="form-row">
                <input type="text" id="promoTitle" placeholder="Judul Promo">
                <input type="text" id="promoDesc" placeholder="Deskripsi Promo">
                <button id="savePromoBtn">💾 Simpan Promo</button>
            </div>
        </div>

        <div class="section">
            <h2>📦 Tambah Produk Baru</h2>
            <div class="form-row">
                <input type="text" id="prodName" placeholder="Nama produk">
                <select id="prodKategori">
                    <option value="beras">🍚 Beras</option>
                    <option value="minyak">🫒 Minyak</option>
                    <option value="gula">🍬 Gula</option>
                    <option value="telur">🥚 Telur</option>
                    <option value="instan">🍜 Mie</option>
                    <option value="bumbu">🧂 Bumbu</option>
                </select>
            </div>
            <div class="form-row">
                <input type="number" id="prodPrice" placeholder="Harga (Rp)">
                <input type="text" id="prodImage" placeholder="URL Gambar">
            </div>
            <div class="form-row">
                <div class="weight-group">
                    <input type="number" id="prodWeightValue" placeholder="Jumlah" step="0.1" value="1">
                    <select id="prodWeightUnit">
                        <option value="kg">kg</option><option value="gr">gr</option>
                        <option value="Liter">Liter</option><option value="ml">ml</option>
                        <option value="pcs">pcs</option><option value="box">box</option>
                    </select>
                </div>
                <button id="addProductBtn">+ Tambah Produk</button>
            </div>
        </div>

        <div class="section">
            <h2>📋 Daftar Semua Produk</h2>
            <div class="product-table">
                <table>
                    <thead><tr><th>Gambar</th><th>Nama</th><th>Kategori</th><th>Harga</th><th>Berat</th><th>Aksi</th></tr></thead>
                    <tbody id="productTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>✏️ Edit Produk</h3>
        <label>Nama Produk</label><input type="text" id="editName">
        <label>Kategori</label><select id="editKategori"><option value="beras">Beras</option><option value="minyak">Minyak</option><option value="gula">Gula</option><option value="telur">Telur</option><option value="instan">Mie</option><option value="bumbu">Bumbu</option></select>
        <label>Harga</label><input type="number" id="editPrice">
        <label>URL Gambar</label><input type="text" id="editImage">
        <label>Berat</label><div class="weight-group"><input type="number" id="editWeightValue" step="0.1"><select id="editWeightUnit"><option value="kg">kg</option><option value="Liter">Liter</option><option value="pcs">pcs</option></select></div>
        <div class="modal-buttons"><button class="save-edit-btn" id="saveEditBtn">💾 Simpan</button><button class="cancel-edit-btn" id="cancelEditBtn">✕ Batal</button></div>
    </div>
</div>

<script>
    const ADMIN_USERNAME = "UmiToko";
    const ADMIN_PASSWORD = "12345";
    
    let products = [];
    let promoData = {};
    let editingProductId = null;

    function formatWeight(value, unit) {
        if (!value) return "";
        const num = parseFloat(value);
        return `${Number.isInteger(num) ? num : num.toFixed(1)}${unit}`;
    }

    function loadData() {
        const stored = localStorage.getItem("warungUmi_products");
        if(stored) {
            products = JSON.parse(stored);
        } else {
            products = [
                { id: 1, name: "Beras Raja Umi", kategori: "beras", price: 72000, image: "https://images.tokopedia.net/img/cache/500-square/VqbcmM/2023/1/23/0edba50f-857f-4d8a-9244-136f4e3215f0.jpg", weightValue: 5, weightUnit: "kg", weight: "5kg" },
                { id: 2, name: "Minyak Goreng Bimoli", kategori: "minyak", price: 34500, image: "https://www.static-src.com/wcsstore/Indraprastha/images/catalog/full//104/MTA-157408265/bimoli_minyak-goreng-bimoli-2-liter_full02.jpg", weightValue: 2, weightUnit: "Liter", weight: "2 Liter" },
                { id: 3, name: "Gulaku Premium", kategori: "gula", price: 17500, image: "https://www.static-src.com/wcsstore/Indraprastha/images/catalog/full//92/MTA-134687265/gulaku_gulaku-premium-1kg_full02.jpg", weightValue: 1, weightUnit: "kg", weight: "1kg" },
                { id: 4, name: "Telur Ayam", kategori: "telur", price: 28500, image: "https://images.tokopedia.net/img/cache/500-square/VqbcmM/2020/11/25/5507a22a-8e9e-4e88-b1e1-6f8afb9ac9de.jpg", weightValue: 1, weightUnit: "kg", weight: "1kg" }
            ];
            localStorage.setItem("warungUmi_products", JSON.stringify(products));
        }
        
        const storedPromo = localStorage.getItem("warungUmi_promo");
        if(storedPromo) {
            promoData = JSON.parse(storedPromo);
        } else {
            promoData = { title: "🎉 PROMO HEMAT! 🎉", desc: "Gratis Ongkir + Diskon s/d 20%" };
            localStorage.setItem("warungUmi_promo", JSON.stringify(promoData));
        }
    }
    
    function saveProducts() { localStorage.setItem("warungUmi_products", JSON.stringify(products)); }
    function savePromo() { localStorage.setItem("warungUmi_promo", JSON.stringify(promoData)); }
    
    function renderProductTable() {
        const tbody = document.getElementById("productTableBody");
        tbody.innerHTML = products.map(prod => `
            <tr>
                <td><img src="${prod.image || 'https://via.placeholder.com/50?text=🛒'}" style="width:50px; height:50px; object-fit:cover; border-radius:8px;"></td>
                <td>${prod.name}</td><td>${prod.kategori}</td><td>Rp${prod.price.toLocaleString()}</td><td>${prod.weight}</td>
                <td><button class="edit-btn" data-id="${prod.id}">✏️ Edit</button><button class="delete-btn" data-id="${prod.id}">🗑️ Hapus</button></td>
            </tr>
        `).join('');
        document.getElementById("totalProducts").innerText = products.length;
        document.querySelectorAll('.edit-btn').forEach(btn => btn.onclick = () => openEditModal(parseInt(btn.dataset.id)));
        document.querySelectorAll('.delete-btn').forEach(btn => btn.onclick = () => deleteProduct(parseInt(btn.dataset.id)));
    }
    
    function openEditModal(id) {
        const prod = products.find(p => p.id === id);
        if(!prod) return;
        editingProductId = id;
        document.getElementById("editName").value = prod.name;
        document.getElementById("editKategori").value = prod.kategori;
        document.getElementById("editPrice").value = prod.price;
        document.getElementById("editImage").value = prod.image || "";
        document.getElementById("editWeightValue").value = prod.weightValue;
        document.getElementById("editWeightUnit").value = prod.weightUnit;
        document.getElementById("editModal").style.display = "flex";
    }
    
    function saveEditProduct() {
        const prod = products.find(p => p.id === editingProductId);
        if(prod) {
            prod.name = document.getElementById("editName").value;
            prod.kategori = document.getElementById("editKategori").value;
            prod.price = parseInt(document.getElementById("editPrice").value);
            prod.image = document.getElementById("editImage").value;
            prod.weightValue = parseFloat(document.getElementById("editWeightValue").value);
            prod.weightUnit = document.getElementById("editWeightUnit").value;
            prod.weight = formatWeight(prod.weightValue, prod.weightUnit);
            saveProducts();
            renderProductTable();
            closeEditModal();
            alert("Produk berhasil diupdate!");
        }
    }
    
    function closeEditModal() { document.getElementById("editModal").style.display = "none"; editingProductId = null; }
    
    function deleteProduct(id) {
        if(confirm("Yakin hapus produk ini?")) {
            products = products.filter(p => p.id !== id);
            saveProducts();
            renderProductTable();
        }
    }
    
    function addProduct() {
        const name = document.getElementById("prodName").value.trim();
        const kategori = document.getElementById("prodKategori").value;
        const price = parseInt(document.getElementById("prodPrice").value);
        const image = document.getElementById("prodImage").value.trim();
        const weightValue = parseFloat(document.getElementById("prodWeightValue").value);
        const weightUnit = document.getElementById("prodWeightUnit").value;
        
        if(!name || !price || !weightValue) { alert("Lengkapi data!"); return; }
        
        const newId = products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 5;
        products.push({ id: newId, name, kategori, price, image, weightValue, weightUnit, weight: formatWeight(weightValue, weightUnit) });
        saveProducts();
        renderProductTable();
        
        document.getElementById("prodName").value = "";
        document.getElementById("prodPrice").value = "";
        document.getElementById("prodImage").value = "";
        document.getElementById("prodWeightValue").value = "1";
        alert("Produk ditambahkan!");
    }
    
    function updatePromo() {
        promoData.title = document.getElementById("promoTitle").value || "Promo";
        promoData.desc = document.getElementById("promoDesc").value || "";
        savePromo();
        alert("Promo diupdate!");
    }
    
    function loadPromoToForm() {
        document.getElementById("promoTitle").value = promoData.title || "";
        document.getElementById("promoDesc").value = promoData.desc || "";
    }
    
    document.getElementById("loginBtn").onclick = () => {
        if(document.getElementById("username").value === ADMIN_USERNAME && document.getElementById("password").value === ADMIN_PASSWORD) {
            document.getElementById("loginContainer").style.display = "none";
            document.getElementById("mainContent").style.display = "block";
            loadData();
            renderProductTable();
            loadPromoToForm();
        } else {
            document.getElementById("loginError").innerText = "Username/Password salah!";
        }
    };
    
    document.getElementById("logoutBtn").onclick = () => {
        document.getElementById("loginContainer").style.display = "block";
        document.getElementById("mainContent").style.display = "none";
        document.getElementById("username").value = "";
        document.getElementById("password").value = "";
    };
    
    document.getElementById("addProductBtn").onclick = addProduct;
    document.getElementById("savePromoBtn").onclick = updatePromo;
    document.getElementById("saveEditBtn").onclick = saveEditProduct;
    document.getElementById("cancelEditBtn").onclick = closeEditModal;
    window.onclick = (e) => { if(e.target === document.getElementById("editModal")) closeEditModal(); };
    
    loadData();
</script>
</body>
</html>
